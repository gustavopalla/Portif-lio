          "name": "Quanto custa criar um site de conversão em Campinas?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O investimento varia conforme a complexidade do projeto. Sites institucionais focados em conversão partem de R$ 1.000, enquanto soluções com automação de WhatsApp e n8n integradas variam de R$ 1.000 a R$ 3.000+. Cada projeto é orçado individualmente após uma conversa inicial para entender as necessidades do negócio."
          }
        },
        {
          "@type": "Question",
          "name": "Como funciona a automação de WhatsApp para negócios locais?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Utilizamos a plataforma n8n integrada com a Meta Cloud API para criar fluxos automáticos de atendimento. Quando um cliente preenche um formulário ou envia uma mensagem, o sistema dispara respostas automáticas pelo WhatsApp, classifica o lead e registra tudo em uma base de dados. Isso elimina gargalos de atendimento e garante que nenhum cliente fique sem resposta."
          }
        },
        {
          "@type": "Question",
          "name": "Qual o prazo de entrega de um site profissional?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sites institucionais e landing pages são entregues em 7 a 15 dias úteis. Projetos com automações mais complexas (integração com WhatsApp, CRM, notificações de retorno) podem levar de 15 a 30 dias. O cronograma exato é definido no briefing inicial."
          }
        },
        {
          "@type": "Question",
          "name": "Você atende empresas fora de Campinas?",
          "acceptedAnswer": {

            "text": "Sim! Atendo presencialmente toda a Região Metropolitana de Campinas — Campinas, Louveira, Valinhos, Jundiaí e Campinas — e remotamente todo o Brasil. Reuniões de levantamento de requisitos podem ser feitas presencialmente na região ou por videochamada."
          }
        },
        {
          "@type": "Question",
          "name": "O que diferencia um site de conversão de um site comum?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Um site de conversão é construído com foco em gerar leads e vendas, não apenas em ter presença online. Isso envolve copy persuasiva, CTAs estratégicos, formulários otimizados, integração com WhatsApp para contato imediato e automações que qualificam o lead antes mesmo do primeiro contato humano."
          }
